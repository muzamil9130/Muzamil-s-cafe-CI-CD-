# CI Pipeline – Muzamil's Cafe
# Triggering a new run with corrected syntax.
# Jobs     : lint → typecheck → build → docker-build → push ECR
##############################################################
name: CI – Build, Lint & Push to ECR

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  AWS_REGION:     ${{ vars.AWS_REGION }}          # e.g. us-east-1
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}      # e.g. cafe-muzamil
  IMAGE_TAG:      ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1 – Quality gates (lint + typecheck + build)
  # ──────────────────────────────────────────────────────────
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️  Checkout source
        uses: actions/checkout@v4

      - name: 🟢  Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦  Install dependencies
        run: npm ci

      - name: 🔍  TypeScript type-check
        run: npx tsc --noEmit

      - name: 🏗️  Build production bundle (Vite)
        run: npm run build

      - name: 📤  Upload dist artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # Job 2 – Build Docker image & push to Amazon ECR
  #          Only runs on pushes to main/master (not PRs)
  # ──────────────────────────────────────────────────────────
  docker-push:
    name: Docker Build & Push ECR
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'

    permissions:
      id-token: write   # required for OIDC auth with AWS
      contents: read

    outputs:
      image: ${{ steps.build-push.outputs.image }}

    steps:
      - name: ⬇️  Checkout source
        uses: actions/checkout@v4

      - name: 🔐  Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:        ${{ env.AWS_REGION }}

      - name: 🔑  Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🐳  Build, tag & push Docker image
        id: build-push
        env:
          REGISTRY:        ${{ steps.login-ecr.outputs.registry }}
          DOCKER_BUILDKIT: 1
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          LATEST_URI="$REGISTRY/$ECR_REPOSITORY:latest"

          docker build \
            --cache-from "$LATEST_URI" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "$IMAGE_URI" \
            -t "$LATEST_URI" \
            .

          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"
