version: "3.9"

services:
  # ── MongoDB ────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: cafe-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret}
      MONGO_INITDB_DATABASE: cafe-muzamil
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - cafe-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cafe-app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret}@mongo:27017/cafe-muzamil?authSource=admin
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      APP_URL: ${APP_URL:-http://localhost:5000}
    ports:
      - "5000:5000"
    networks:
      - cafe-net

volumes:
  mongo_data:

networks:
  cafe-net:
    driver: bridge
